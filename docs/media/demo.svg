<text x="117.0" y="576" fill="#abb2bf" font-weight="normal" xml:space="preserve"> Instruction-override phrasing  [SX-INJ · prompt-injection]</text>
<text x="16.0" y="595" fill="#abb2bf" font-weight="normal" xml:space="preserve">           SKILL.md:19</text>
