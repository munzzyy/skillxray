<text x="16.0" y="481" fill="#abb2bf" font-weight="normal" xml:space="preserve">           A AWS access key id appears to be committed into the skill.</text>
<text x="16.0" y="500" fill="#5c6370" font-weight="normal" xml:space="preserve">           &gt; (redacted)</text>
<text x="16.0" y="519" fill="#5c6370" font-weight="normal" xml:space="preserve">           fix: Remove the credential and rotate it — anything pushed to git is compromised. Loa</text>
